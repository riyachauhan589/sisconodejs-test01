name: Deploy sisconodejs Backend

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      # ✅ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm

      # ✅ Install dependencies
      - name: Install dependencies
        run: npm ci

    